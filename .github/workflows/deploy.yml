name: Deploy to Render

on:
  workflow_run:
    workflows: ["DevOps App CI"]
    types: [completed]
    branches: [master] # master-dəki CI bitəndə bura baxacaq

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployment Update" >> $GITHUB_STEP_SUMMARY
          echo "Render is currently building and deploying from master branch." >> $GITHUB_STEP_SUMMARY